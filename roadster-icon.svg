<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a0508"/>
      <stop offset="40%"  stop-color="#4a0f18"/>
      <stop offset="75%"  stop-color="#7d1a2e"/>
      <stop offset="100%" stop-color="#a82840"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffb3be" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <clipPath id="round">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background with clip -->
  <g clip-path="url(#round)">
    <rect width="512" height="512" fill="url(#bg)"/>
    <!-- Glow orbs -->
    <ellipse cx="100" cy="80"  rx="220" ry="160" fill="rgba(220,80,80,0.28)"/>
    <ellipse cx="460" cy="460" rx="180" ry="140" fill="rgba(120,20,40,0.32)"/>
    <!-- Top glass shimmer -->
    <rect width="512" height="260" fill="url(#shine)"/>
  </g>

  <!-- R letterform — bold, centered -->
  <text
    x="256" y="348"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
    font-size="296"
    font-weight="800"
    text-anchor="middle"
    fill="url(#letter)"
    filter="url(#shadow)"
    letter-spacing="-8"
  >R</text>

  <!-- Subtle bottom reflection line -->
  <g clip-path="url(#round)">
    <rect x="0" y="490" width="512" height="22" rx="0" fill="rgba(255,255,255,0.06)"/>
  </g>
</svg>
